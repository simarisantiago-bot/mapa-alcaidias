<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alcaidías CABA — Policía de la Ciudad</title>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    #header {
      background: #1e293b;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #334155;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 58px;
    }

    #header h1 {
      font-size: 1rem;
      color: #f8fafc;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    #header h1 span { color: #60a5fa; }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stat {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 4px 12px;
      text-align: center;
    }

    .stat .n {
      font-size: 1.25rem;
      font-weight: 800;
      line-height: 1.2;
      color: #60a5fa;
    }

    .stat .l {
      font-size: 0.65rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    #content {
      display: flex;
      height: calc(100vh - 58px);
      position: relative;
    }

    #sidebar {
      width: 260px;
      min-width: 260px;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s ease, min-width 0.25s ease;
    }

    #sidebar.collapsed {
      width: 0;
      min-width: 0;
    }

    #toggle-btn {
      position: absolute;
      left: 260px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      background: #1e293b;
      border: 1px solid #334155;
      border-left: none;
      color: #94a3b8;
      width: 16px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 6px 6px 0;
      font-size: 0.65rem;
      transition: left 0.25s ease, background 0.15s;
    }

    #toggle-btn:hover { background: #334155; color: #f1f5f9; }

    #sidebar.collapsed ~ #toggle-btn {
      left: 0;
    }

    #search-wrap {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    #search-input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 0.82rem;
      outline: none;
    }

    #search-input::placeholder { color: #475569; }
    #search-input:focus { border-color: #60a5fa; }

    #results {
      overflow-y: auto;
      flex: 1;
    }

    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .result-item {
      padding: 9px 12px;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      transition: background 0.15s;
    }

    .result-item:hover { background: #0f172a; }

    .result-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 2px;
    }

    .result-dir {
      font-size: 0.7rem;
      color: #64748b;
    }

    .result-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .no-results {
      padding: 16px 12px;
      font-size: 0.78rem;
      color: #475569;
      text-align: center;
    }

    #map { flex: 1; height: 100%; }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      color: #e2e8f0 !important;
      border-radius: 8px !important;
      border: 1px solid #334155 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { color: #94a3b8 !important; }

    .popup h3 {
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #f1f5f9;
    }

    .popup .row {
      font-size: 0.78rem;
      color: #94a3b8;
      margin: 3px 0;
    }

    .popup .row strong { color: #cbd5e1; }

    .popup .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
    }

    .popup .seccion {
      font-size: 0.68rem;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Legend */
    .legend {
      background: rgba(15,23,42,0.92) !important;
      border: 1px solid #334155 !important;
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
    }

    .legend h4 {
      font-size: 0.78rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 7px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.76rem;
      color: #cbd5e1;
      margin: 2px 0;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.25);
    }
  </style>
</head>

// Suprime el ícono default de Leaflet (evita los pines rojos con "+")
const _emptyIcon = L.icon({
  iconUrl: 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7',
  iconSize: [0, 0], iconAnchor: [0, 0], popupAnchor: [0, 0],

L.Marker.prototype.options.icon = _emptyIcon;

// ── Mapa ────────────────────────────────────────────────────────────────────
const map = L.map('map', {

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

  maxZoom: 19,

// ── Marcadores ──────────────────────────────────────────────────────────────
const markers = [];

datos.forEach(function(a) {
  const cfg = PERFILES[a.p] || { color: '#888', label: a.p };

  const marker = L.circleMarker([a.lat, a.lng], {
    radius: a.d > 0 ? Math.max(9, 7 + a.d * 0.6) : 9,
    fillColor: cfg.color,
    color: '#fff',
    weight: 2,
    opacity: 1,
    fillOpacity: 1,
  });

  const detText = a.d > 0
    ? `<strong>${a.d}</strong> detenido${a.d !== 1 ? 's' : ''}`
    : '<span style="color:#64748b">Sin datos</span>';

  marker.bindPopup(`
    <div class="popup">
      <div class="seccion">Alcaidía ${a.s}</div>
      <h3>${a.n}</h3>
      <div class="row">📍 <strong>${a.dir}</strong></div>
      <div class="row">👤 Detenidos: ${detText}</div>
      <div><span class="badge" style="background:${cfg.color}">${cfg.label.toUpperCase()}</span></div>
    </div>
  `, { maxWidth: 260 });

  marker.addTo(map);
  markers.push({ data: a, marker, cfg });
});

// ── Buscador ────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const resultsDiv  = document.getElementById('results');

function renderResults(query) {
  const q = query.trim().toLowerCase();
  function sortKey(name) {
    const n = name.toLowerCase();
    let group = 4, num = 0, suffix = n;
    if (n.startsWith('alcaid')) {
      group = 1;
      const m = name.match(/alcaid[íi]a\s+(\d+)/i);
      num = m ? parseInt(m[1]) : 999;
      suffix = name.replace(/alcaid[íi]a\s+\d+\s*/i, '').toLowerCase();
    } else if (n.startsWith('cad')) {
      group = 2;
      suffix = n;
    } else if (n.startsWith('complejo') || n.startsWith('centro')) {
      group = 3;
      suffix = n;
    }
    return { group, num, suffix };
  }

  function customSort(a, b) {
    const ka = sortKey(a.data.n), kb = sortKey(b.data.n);
    if (ka.group !== kb.group) return ka.group - kb.group;
    if (ka.num !== kb.num) return ka.num - kb.num;
    return ka.suffix.localeCompare(kb.suffix, 'es');
  }

  const filtered = (q
    ? markers.filter(m =>
        m.data.n.toLowerCase().includes(q) ||
        m.data.dir.toLowerCase().includes(q)
      )
    : [...markers]
  ).sort(customSort);

  if (filtered.length === 0) {
    resultsDiv.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }

  resultsDiv.innerHTML = filtered.map((m, i) => `
    <div class="result-item" data-idx="${markers.indexOf(m)}">
      <div class="result-name">
        <span class="result-dot" style="background:${m.cfg.color}"></span>${m.data.n}
      </div>
      <div class="result-dir">${m.data.dir}</div>
    </div>
  `).join('');

  resultsDiv.querySelectorAll('.result-item').forEach(el => {
    el.addEventListener('click', function() {
      const idx = parseInt(this.dataset.idx);
      const { data, marker } = markers[idx];
      map.setView([data.lat, data.lng], 17);
      marker.openPopup();
    });
  });
}

renderResults('');
searchInput.addEventListener('input', e => renderResults(e.target.value));

// ── Toggle sidebar ───────────────────────────────────────────────────────────
const sidebar   = document.getElementById('sidebar');
const toggleBtn = document.getElementById('toggle-btn');

toggleBtn.addEventListener('click', function() {
  const collapsed = sidebar.classList.toggle('collapsed');
  toggleBtn.textContent = collapsed ? '▶' : '◀';
  toggleBtn.style.left = collapsed ? '0' : '260px';
  setTimeout(() => map.invalidateSize(), 260);
});

// ── Leyenda ─────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });

legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>Perfil de alojamiento</h4>';
  Object.entries(PERFILES).forEach(([k, v]) => {
    div.innerHTML += `<div class="legend-row">
      <div class="dot" style="background:${v.color}"></div>
      <span>${v.label}</span>
    </div>`;
  });
  div.innerHTML += `<div style="margin-top:8px;font-size:0.65rem;color:#64748b;border-top:1px solid #334155;padding-top:6px">
    Datos al 09-04-2026<br>Coords. aproximadas
  </div>`;
  return div;
};

legend.addTo(map);
</script>
</body>
</html>
